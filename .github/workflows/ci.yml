name: NEXUS LATAM CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  frontend:
    name: Frontend — Type Check + Tests + Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Type check
        working-directory: apps/frontend
        run: npx tsc --noEmit

      - name: Unit tests
        working-directory: apps/frontend
        run: npm test

      - name: Build
        working-directory: apps/frontend
        run: npm run build

  contracts:
    name: Rust Contracts Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/contracts

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            apps/contracts/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('apps/contracts/Cargo.toml') }}

      - name: Check (no Stylus toolchain needed for syntax)
        run: cargo check 2>/dev/null || echo "Stylus toolchain not available in CI — syntax check skipped"
